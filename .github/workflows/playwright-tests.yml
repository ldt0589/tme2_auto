name: Playwright Tests

on:
  push:
    branches: [main, master, develop]
  pull_request:
    branches: [main, master, develop]
  workflow_dispatch:
    inputs:
      env:
        description: 'Test environment'
        required: true
        default: 'staging'
        type: choice
        options:
          - test
          - staging
          - production
      grep:
        description: 'Test filter (e.g. @smoke, @regression, or blank for all)'
        required: false
        default: ''

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  test:
    name: Run Playwright Tests
    runs-on: ubuntu-latest
    timeout-minutes: 60

    env:
      ENV: ${{ github.event.inputs.env || 'staging' }}
      USERNAME: ${{ secrets.TEST_USERNAME }}
      PASSWORD: ${{ secrets.TEST_PASSWORD }}
      # BASIC_AUTH_ENABLED: ${{ secrets.BASIC_AUTH_ENABLED }}
      # BASIC_AUTH_USER: ${{ secrets.BASIC_AUTH_USER }}
      # BASIC_AUTH_PASS: ${{ secrets.BASIC_AUTH_PASS }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Setup Java (required for Allure CLI)
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install chromium --with-deps

      - name: Install Allure CLI
        run: npm install -g allure-commandline

      - name: Run Playwright tests
        run: |
          if [ -n "${{ github.event.inputs.grep }}" ]; then
            npx playwright test --grep "${{ github.event.inputs.grep }}"
          else
            npx playwright test
          fi
        continue-on-error: true

      - name: Get Allure history from gh-pages
        uses: actions/checkout@v4
        if: always()
        continue-on-error: true
        with:
          ref: gh-pages
          path: gh-pages

      - name: Copy Allure history
        if: always()
        continue-on-error: true
        run: |
          mkdir -p allure-results/history
          if [ -d "gh-pages/history" ]; then
            cp -r gh-pages/history/. allure-results/history/
          fi

      - name: Generate Allure report
        if: always()
        run: allure generate ./allure-results --clean -o ./allure-report

      - name: Deploy Allure report to GitHub Pages
        if: always()
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_branch: gh-pages
          publish_dir: ./allure-report
          keep_files: false

      - name: Upload Allure results as artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: allure-results-${{ github.run_number }}
          path: allure-results/
          retention-days: 7

      - name: Upload Allure report as artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: allure-report-${{ github.run_number }}
          path: allure-report/
          retention-days: 30

      - name: Print Allure Report URL
        if: always()
        run: |
          echo "=========================================="
          echo "Allure Report URL:"
          echo "https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}/"
          echo "=========================================="
